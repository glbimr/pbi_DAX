<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DAX Practice Hub</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Babel for in-browser JSX compilation -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- SheetJS for Excel Export -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
</head>
<body class="bg-slate-50 font-sans min-h-screen">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // --- ICON COMPONENTS ---
        const Database = ({ size = 24, className = "" }) => (
            <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><ellipse cx="12" cy="5" rx="9" ry="3"/><path d="M3 5V19A9 3 0 0 0 21 19V5"/><path d="M3 12A9 3 0 0 0 21 12"/></svg>
        );
        const Code2 = ({ size = 24, className = "" }) => (
            <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></svg>
        );
        const CalendarClock = ({ size = 24, className = "" }) => (
            <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M21 7.5V6a2 2 0 0 0-2-2H5a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h3.5"/><path d="M16 2v4"/><path d="M8 2v4"/><path d="M3 10h5"/><path d="M17.5 17.5 16 16.3V14"/><circle cx="16" cy="16" r="6"/></svg>
        );
        const ChevronDown = ({ size = 24, className = "" }) => (
            <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polyline points="6 9 12 15 18 9"/></svg>
        );
        const ChevronUp = ({ size = 24, className = "" }) => (
            <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polyline points="18 15 12 9 6 15"/></svg>
        );
        const Lightbulb = ({ size = 24, className = "" }) => (
            <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M15 14c.2-1 .7-1.7 1.5-2.5 1-.9 1.5-2.2 1.5-3.5A6 6 0 0 0 6 8c0 1.3.5 2.6 1.5 3.5.8.8 1.3 1.5 1.5 2.5"/><path d="M9 18h6"/><path d="M10 22h4"/></svg>
        );
        const TableProperties = ({ size = 24, className = "" }) => (
            <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M15 3v18"/><rect width="18" height="18" x="3" y="3" rx="2"/><path d="M21 9H3"/><path d="M21 15H3"/></svg>
        );
        const PlayCircle = ({ size = 24, className = "" }) => (
            <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="10"/><polygon points="10 8 16 12 10 16 10 8"/></svg>
        );
        const Download = ({ size = 24, className = "" }) => (
            <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" x2="12" y1="15" y2="3"/></svg>
        );
        const Info = ({ size = 24, className = "" }) => (
            <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="10"/><path d="M12 16v-4"/><path d="M12 8h.01"/></svg>
        );

        // --- DATA: Sample Schema ---
        const schemaData = {
          Sales: [
            { OrderID: '101', Date: '2023-01-15', ProductID: 'P1', Region: 'North', Quantity: 5, SalesAmount: 250 },
            { OrderID: '102', Date: '2023-02-20', ProductID: 'P2', Region: 'South', Quantity: 2, SalesAmount: 800 },
            { OrderID: '103', Date: '2023-03-10', ProductID: 'P1', Region: 'East', Quantity: 10, SalesAmount: 500 },
            { OrderID: '104', Date: '2024-01-15', ProductID: 'P3', Region: 'North', Quantity: 1, SalesAmount: 1200 },
            { OrderID: '105', Date: '2024-02-05', ProductID: 'P2', Region: 'West', Quantity: 3, SalesAmount: 1200 },
            { OrderID: '106', Date: '2024-03-12', ProductID: 'P4', Region: 'South', Quantity: 5, SalesAmount: 150 },
            { OrderID: '107', Date: '2024-04-01', ProductID: 'P1', Region: 'West', Quantity: 8, SalesAmount: 400 },
            { OrderID: '108', Date: '2023-04-15', ProductID: 'P3', Region: 'East', Quantity: 2, SalesAmount: 2400 },
            { OrderID: '109', Date: '2023-05-20', ProductID: 'P4', Region: 'North', Quantity: 10, SalesAmount: 1000 },
            { OrderID: '110', Date: '2023-06-11', ProductID: 'P2', Region: 'West', Quantity: 1, SalesAmount: 250 },
            { OrderID: '111', Date: '2023-07-05', ProductID: 'P1', Region: 'South', Quantity: 20, SalesAmount: 1000 },
            { OrderID: '112', Date: '2023-08-22', ProductID: 'P3', Region: 'East', Quantity: 3, SalesAmount: 3600 },
            { OrderID: '113', Date: '2023-09-14', ProductID: 'P4', Region: 'West', Quantity: 5, SalesAmount: 500 },
            { OrderID: '114', Date: '2023-10-30', ProductID: 'P2', Region: 'North', Quantity: 4, SalesAmount: 1000 },
            { OrderID: '115', Date: '2023-11-25', ProductID: 'P1', Region: 'East', Quantity: 15, SalesAmount: 750 },
            { OrderID: '116', Date: '2023-12-10', ProductID: 'P3', Region: 'South', Quantity: 5, SalesAmount: 6000 },
            { OrderID: '117', Date: '2023-12-28', ProductID: 'P4', Region: 'North', Quantity: 8, SalesAmount: 800 },
            { OrderID: '118', Date: '2024-01-05', ProductID: 'P1', Region: 'West', Quantity: 10, SalesAmount: 500 },
            { OrderID: '119', Date: '2024-02-14', ProductID: 'P2', Region: 'East', Quantity: 2, SalesAmount: 500 },
            { OrderID: '120', Date: '2024-03-22', ProductID: 'P3', Region: 'North', Quantity: 1, SalesAmount: 1200 },
            { OrderID: '121', Date: '2024-04-18', ProductID: 'P4', Region: 'South', Quantity: 12, SalesAmount: 1200 },
            { OrderID: '122', Date: '2024-05-09', ProductID: 'P1', Region: 'East', Quantity: 6, SalesAmount: 300 },
            { OrderID: '123', Date: '2024-06-17', ProductID: 'P2', Region: 'West', Quantity: 3, SalesAmount: 750 },
            { OrderID: '124', Date: '2024-07-21', ProductID: 'P3', Region: 'South', Quantity: 2, SalesAmount: 2400 },
            { OrderID: '125', Date: '2024-08-05', ProductID: 'P4', Region: 'East', Quantity: 4, SalesAmount: 400 },
            { OrderID: '126', Date: '2024-09-11', ProductID: 'P1', Region: 'North', Quantity: 25, SalesAmount: 1250 },
            { OrderID: '127', Date: '2024-10-02', ProductID: 'P2', Region: 'South', Quantity: 5, SalesAmount: 1250 },
          ],
          Products: [
            { ProductID: 'P1', ProductName: 'Wireless Mouse', Category: 'Accessories', Cost: 20 },
            { ProductID: 'P2', ProductName: 'Office Chair', Category: 'Furniture', Cost: 150 },
            { ProductID: 'P3', ProductName: 'Laptop Pro', Category: 'Electronics', Cost: 800 },
            { ProductID: 'P4', ProductName: 'Ergonomic Keyboard', Category: 'Accessories', Cost: 60 },
          ]
        };

        // --- DATA: Practice Questions ---
        const questions = [
          // --- VALUE & FILTER DAX ---
          {
            id: 1,
            category: 'Value',
            title: '1. Count Transactions per Product',
            tags: ['RELATEDTABLE', 'COUNTROWS'],
            question: 'Write a calculated column in the Products table that counts how many times each product has been sold in the Sales table.',
            dax: `TransactionCount = \nCOUNTROWS(\n    RELATEDTABLE(Sales)\n)`,
            explanation: [
                "<strong>RELATEDTABLE()</strong> acts as a bridge. Because there is a physical relationship between Products and Sales, it shifts the context from the current row in the Products table (Row Context) to all the matching rows in the Sales table.",
                "<strong>COUNTROWS()</strong> then takes that filtered virtual table of matching sales records and simply counts the number of rows in it."
            ]
          },
          {
            id: 2,
            category: 'Value',
            title: '2. Total Sales for High-Value Items',
            tags: ['CALCULATE', 'FILTER'],
            question: 'Create a measure to calculate the total SalesAmount, but only for transactions where the SalesAmount is strictly greater than 500.',
            dax: `HighValueSales = \nCALCULATE(\n    SUM(Sales[SalesAmount]),\n    FILTER(\n        Sales,\n        Sales[SalesAmount] > 500\n    )\n)`,
            explanation: [
                "<strong>FILTER()</strong> is an iterator function. It scans the entire <code>Sales</code> table row-by-row (Row Context), evaluates the <code>SalesAmount > 500</code> condition, and returns a new virtual table containing only the matching rows.",
                "<strong>CALCULATE()</strong> is the context modifier. It takes the virtual table generated by FILTER and applies it as the new Filter Context.",
                "Finally, <strong>SUM()</strong> calculates the total of <code>SalesAmount</code> using this newly restricted data."
            ]
          },
          {
            id: 3,
            category: 'Value',
            title: '3. ALL: Ignore Region Filters Completely',
            tags: ['ALL', 'CALCULATE'],
            question: 'Write a measure that calculates total sales for all regions combined, completely ignoring any filters applied to the Region column.',
            dax: `Total_ALL_Regions = \nCALCULATE(\n    SUM(Sales[SalesAmount]),\n    ALL(Sales[Region])\n)`,
            explanation: [
                "<strong>ALL()</strong> acts as a filter 'destroyer'. By targeting <code>Sales[Region]</code>, it completely removes any filters currently applied to the Region column (e.g., from a slicer or a matrix row).",
                "<strong>CALCULATE()</strong> applies this unrestricted context, meaning the measure will aggregate the <code>SUM</code> for every region combined, regardless of user selections."
            ]
          },
          {
            id: 4,
            category: 'Value',
            title: '4. ALLEXCEPT: Protect the Region Slicer',
            tags: ['ALLEXCEPT', 'CALCULATE'],
            question: 'Write a measure that calculates total sales by keeping the filter on the Region column but removing filters from all other columns in the Sales table.',
            dax: `Total_Slicer_Region_Only = \nCALCULATE(\n    SUM(Sales[SalesAmount]),\n    ALLEXCEPT(Sales, Sales[Region])\n)`,
            explanation: [
                "<strong>ALLEXCEPT()</strong> acts as a filter 'protector'. It tells DAX to clear filters from every single column in the <code>Sales</code> table <em>except</em> for the <code>Region</code> column.",
                "This means if a user filters by Date or Product, those filters are ignored, but if they filter by Region, that specific filter is respected during the <strong>CALCULATE()</strong> evaluation."
            ]
          },
          {
            id: 5,
            category: 'Value',
            title: '5. ALLSELECTED: Respect the Slicer, Ignore the Row',
            tags: ['ALLSELECTED', 'CALCULATE'],
            question: 'Write a measure that calculates total sales for the regions currently selected in an external slicer, ignoring any internal row filters applied by the visual itself.',
            dax: `Total_Selected_Regions = \nCALCULATE(\n    SUM(Sales[SalesAmount]),\n    ALLSELECTED(Sales[Region])\n)`,
            explanation: [
                "<strong>ALLSELECTED()</strong> restores the filter context to reflect exactly what is explicitly chosen in external slicers or page filters.",
                "It ignores internal visual filters. If a matrix has Region on the rows, ALLSELECTED ignores the individual row context (e.g., 'North') and evaluates the grand total of the selected slicer items."
            ]
          },
          
          // --- TIME INTELLIGENCE DAX ---
          {
            id: 6,
            category: 'Time',
            title: '6. First & Last Sale Dates for Products',
            tags: ['FIRSTDATE', 'LASTDATE'],
            question: 'Write two measures to find the date of the very first sale and the very last sale based on the fact table. Imagine you place these in a matrix visual with ProductName on the rows.',
            dax: `FirstSaleDate = FIRSTDATE(Sales[Date])\n    \nLastSaleDate = LASTDATE(Sales[Date])`,
            explanation: [
                "<strong>FIRSTDATE()</strong> and <strong>LASTDATE()</strong> look at the <code>Sales[Date]</code> column within the current filter context (e.g., for a specific Product on a visual row).",
                "Unlike MIN or MAX which return a single scalar value, these functions return a <em>table</em> containing a single column and a single row with the date. This structure allows them to be used seamlessly inside CALCULATE as filter arguments."
            ]
          },
          {
            id: 7,
            category: 'Time',
            title: '7. Start and End of Current Period',
            tags: ['STARTOFMONTH', 'ENDOFYEAR'],
            question: 'If a user is looking at the March 2024 sales, write measures to return the first day of that month and the last day of that year dynamically based on the Sales table.',
            dax: `MonthStart = STARTOFMONTH(Sales[Date])\n\nYearEnd = ENDOFYEAR(Sales[Date])`,
            explanation: [
                "<strong>STARTOFMONTH()</strong> evaluates all the dates visible in <code>Sales[Date]</code> under the current filter context, identifies the month, and extracts the first date of that month.",
                "<strong>ENDOFYEAR()</strong> similarly looks at the current context and extracts the absolute last date of the year. Both return a single-row table containing the respective date."
            ]
          }
        ];

        // --- COMPONENTS ---
        const TabButton = ({ active, onClick, icon: Icon, text }) => (
          <button
            onClick={onClick}
            className={`flex items-center space-x-2 px-6 py-3 font-medium transition-all duration-200 border-b-2 ${
              active 
                ? 'border-blue-600 text-blue-700 bg-blue-50/50' 
                : 'border-transparent text-gray-500 hover:text-gray-700 hover:bg-gray-50'
            }`}
          >
            <Icon size={18} />
            <span>{text}</span>
          </button>
        );

        const SchemaViewer = () => {
          const handleDownloadExcel = () => {
            if (window.XLSX) {
              const wb = window.XLSX.utils.book_new();
              const salesSheet = window.XLSX.utils.json_to_sheet(schemaData.Sales);
              const productsSheet = window.XLSX.utils.json_to_sheet(schemaData.Products);
              
              window.XLSX.utils.book_append_sheet(wb, salesSheet, "Sales");
              window.XLSX.utils.book_append_sheet(wb, productsSheet, "Products");
              
              window.XLSX.writeFile(wb, "DAX_Practice_Dataset.xlsx");
            } else {
              alert("Excel library is not loaded. Please try again or refresh the page.");
            }
          };

          return (
            <div className="space-y-6 animate-in fade-in duration-500 p-4">
              <div className="bg-blue-50 border border-blue-200 rounded-lg p-4 mb-6 flex flex-col md:flex-row md:items-center justify-between gap-4">
                <div>
                  <h3 className="text-blue-800 font-semibold flex items-center mb-2">
                    <Lightbulb className="mr-2" size={18} /> Model Context
                  </h3>
                  <p className="text-sm text-blue-900">
                    Assume a standard Star Schema. <strong>Sales</strong> is the Fact table and <strong>Products</strong> is the Dimension table. 
                    There is a 1-to-Many relationship from Products[ProductID] to Sales[ProductID].
                  </p>
                </div>
                <button 
                  onClick={handleDownloadExcel}
                  className="flex items-center space-x-2 bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-lg text-sm font-medium transition-colors shadow-sm whitespace-nowrap"
                >
                  <Download size={16} />
                  <span>Download Excel</span>
                </button>
              </div>

              <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                {Object.entries(schemaData).map(([tableName, data]) => (
                  <div key={tableName} className="border border-gray-200 rounded-lg shadow-sm bg-white overflow-hidden">
                    <div className="bg-gray-100 px-4 py-2 border-b border-gray-200 flex items-center justify-between">
                      <span className="font-bold text-gray-700 flex items-center">
                        <TableProperties size={16} className="mr-2 text-gray-500" />
                        {tableName} Table
                      </span>
                    </div>
                    <div className="overflow-x-auto">
                      <table className="w-full text-sm text-left">
                        <thead className="bg-gray-50 text-gray-600">
                          <tr>
                            {Object.keys(data[0]).map(key => (
                              <th key={key} className="px-4 py-2 border-b">{key}</th>
                            ))}
                          </tr>
                        </thead>
                        <tbody>
                          {data.map((row, i) => (
                            <tr key={i} className="border-b last:border-0 hover:bg-gray-50">
                              {Object.values(row).map((val, j) => (
                                <td key={j} className="px-4 py-2 text-gray-700">{val}</td>
                              ))}
                            </tr>
                          ))}
                        </tbody>
                      </table>
                    </div>
                  </div>
                ))}
              </div>
            </div>
          );
        };

        const QuestionCard = ({ item }) => {
          const [isOpen, setIsOpen] = useState(false);

          return (
            <div className="border border-gray-200 rounded-xl bg-white shadow-sm hover:shadow-md transition-shadow duration-200 overflow-hidden">
              <div className="p-5">
                <div className="flex justify-between items-start mb-3">
                  <h3 className="text-lg font-bold text-gray-800">{item.title}</h3>
                  <div className="flex flex-wrap gap-2">
                    {item.tags.map(tag => (
                      <span key={tag} className="px-2.5 py-1 bg-gray-100 text-gray-600 text-xs font-semibold rounded-full border border-gray-200">
                        {tag}
                      </span>
                    ))}
                  </div>
                </div>
                
                <p className="text-gray-700 mb-4">{item.question}</p>
                
                <button 
                  onClick={() => setIsOpen(!isOpen)}
                  className="flex items-center space-x-2 text-sm font-medium text-blue-600 hover:text-blue-800 transition-colors bg-blue-50 hover:bg-blue-100 px-4 py-2 rounded-lg"
                >
                  {isOpen ? <ChevronUp size={16} /> : <ChevronDown size={16} />}
                  <span>{isOpen ? 'Hide Solution' : 'Show Solution'}</span>
                </button>
              </div>

              {isOpen && (
                <div className="bg-slate-900 border-t border-gray-200 animate-in slide-in-from-top-2 duration-200">
                  <div className="p-5">
                    <div className="flex items-center text-slate-300 text-sm font-semibold mb-2">
                      <Code2 size={16} className="mr-2" /> DAX Code
                    </div>
                    <pre className="bg-slate-800 p-4 rounded-lg overflow-x-auto border border-slate-700">
                      <code className="text-blue-300 font-mono text-sm leading-relaxed">
                        {item.dax}
                      </code>
                    </pre>
                    
                    <div className="mt-4 bg-blue-900/30 border border-blue-800/50 rounded-lg p-4">
                      <div className="flex items-start text-blue-100">
                        <Lightbulb className="mr-2 mt-0.5 text-blue-400 shrink-0" size={18} />
                        <div className="text-sm leading-relaxed w-full">
                          <strong className="text-white block mb-2">How it works:</strong>
                          {Array.isArray(item.explanation) ? (
                            <ul className="list-disc list-outside ml-4 space-y-2">
                              {item.explanation.map((line, idx) => (
                                <li key={idx} dangerouslySetInnerHTML={{ __html: line }} />
                              ))}
                            </ul>
                          ) : (
                            <p>{item.explanation}</p>
                          )}
                        </div>
                      </div>
                    </div>
                  </div>
                </div>
              )}
            </div>
          );
        };

        const App = () => {
          const [activeTab, setActiveTab] = useState('schema');

          const filteredQuestions = questions.filter(q => {
            if (activeTab === 'value') return q.category === 'Value';
            if (activeTab === 'time') return q.category === 'Time';
            return false;
          });

          return (
            <div>
              {/* Header */}
              <header className="bg-white border-b border-gray-200 sticky top-0 z-10 shadow-sm">
                <div className="max-w-5xl mx-auto px-4 sm:px-6 lg:px-8">
                  <div className="flex items-center justify-between h-16">
                    <div className="flex items-center space-x-3">
                      <div className="bg-blue-600 p-2 rounded-lg text-white">
                        <PlayCircle size={24} />
                      </div>
                      <h1 className="text-xl font-extrabold text-gray-900 tracking-tight">
                        DAX Practice Hub
                      </h1>
                    </div>
                    <div className="text-sm text-gray-500 hidden sm:block">
                      Master Context, Filters, and Time Intelligence
                    </div>
                  </div>
                  
                  {/* Tabs */}
                  <div className="flex space-x-2 overflow-x-auto">
                    <TabButton 
                      active={activeTab === 'schema'} 
                      onClick={() => setActiveTab('schema')} 
                      icon={Database} 
                      text="Dataset & Schema" 
                    />
                    <TabButton 
                      active={activeTab === 'value'} 
                      onClick={() => setActiveTab('value')} 
                      icon={TableProperties} 
                      text="Filter & Value DAX" 
                    />
                    <TabButton 
                      active={activeTab === 'time'} 
                      onClick={() => setActiveTab('time')} 
                      icon={CalendarClock} 
                      text="Time Intelligence" 
                    />
                  </div>
                </div>
              </header>

              {/* Main Content */}
              <main className="max-w-5xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
                {activeTab === 'schema' && (
                  <div>
                    <div className="mb-6">
                      <h2 className="text-2xl font-bold text-gray-900">Understand the Data</h2>
                      <p className="text-gray-600 mt-1">Review the sample tables below to understand the context of the practice questions.</p>
                    </div>
                    <SchemaViewer />
                  </div>
                )}

                {(activeTab === 'value' || activeTab === 'time') && (
                  <div className="space-y-6">
                    <div className="mb-6">
                      <h2 className="text-2xl font-bold text-gray-900">
                        {activeTab === 'value' ? 'Filter & Value Functions' : 'Time Intelligence Functions'}
                      </h2>
                      <p className="text-gray-600 mt-1">
                        Read the scenario, think about your DAX approach, and then reveal the solution to check your work.
                      </p>
                      
                      {activeTab === 'time' && (
                        <div className="mt-4 bg-amber-50 border border-amber-200 border-l-4 border-l-amber-500 p-4 rounded-lg flex items-start">
                          <Info className="text-amber-500 mr-3 shrink-0 mt-0.5" size={20} />
                          <p className="text-sm text-amber-800 leading-relaxed">
                            <strong>Best Practice Note:</strong> The formulas below are intentionally written using <code>Sales[Date]</code> to directly match the <code>Sales</code> table schema provided in the dataset. However, in a real Power BI environment, Time Intelligence functions (like PREVIOUSMONTH, YTD, etc.) require a separate, continuous <strong>Calendar / Date table</strong> marked as a Date Table to guarantee mathematically accurate results.
                          </p>
                        </div>
                      )}
                    </div>
                    
                    <div className="grid gap-6">
                      {filteredQuestions.map(q => (
                        <QuestionCard key={q.id} item={q} />
                      ))}
                    </div>
                  </div>
                )}
              </main>
            </div>
          );
        }

        // Render the app
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
